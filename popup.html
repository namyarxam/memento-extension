<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      padding: 20px;
      background: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fafafa;
      letter-spacing: -0.01em;
    }

    .header .sub {
      font-size: 11px;
      color: #71717a;
      margin-top: 1px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #a1a1aa;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 5px;
      margin-top: 14px;
    }

    input {
      width: 100%;
      padding: 9px 11px;
      border-radius: 7px;
      border: 1px solid #27272a;
      background: #18181b;
      color: #fafafa;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #2563eb;
    }

    input::placeholder { color: #52525b; }

    .note {
      font-size: 11px;
      color: #52525b;
      margin-top: 4px;
      line-height: 1.4;
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #1d4ed8; }

    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
      height: 16px;
      color: #22c55e;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .divider {
      border: none;
      border-top: 1px solid #27272a;
      margin: 18px 0 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🧱 Capture Brick</h1>
      <div class="sub">Settings</div>
    </div>
  </div>

  <label>Notion Integration Secret</label>
  <input type="password" id="notionKey" placeholder="secret_...">
  <div class="note">From notion.so/profile/integrations</div>

  <hr class="divider">

  <label>Anthropic API Key</label>
  <input type="password" id="claudeKey" placeholder="sk-ant-...">
  <div class="note">Used for auto-tagging bricks. Optional but recommended.</div>

  <button id="save">Save Settings</button>
  <div class="status" id="status">✓ Settings saved</div>

  <script src="popup.js"></script>
</body>
</html>
